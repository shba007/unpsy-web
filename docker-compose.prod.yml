version: '3.9'
services:
  app:
    image: ghcr.io/shba007/unpsy-web:latest
    env_file:
      - .env
    volumes:
      - unpsy_static:/app/static
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

volumes:
  unpsy_static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/unpsy/static

networks:
  internal:
    driver: overlay
